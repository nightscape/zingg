    - org.apache.spark:spark-sql_2.13:4.1.1
    - org.apache.spark:spark-core_2.13:4.1.1;exclude=at.yawk.lz4:lz4-java;exclude=org.apache.zookeeper:zookeeper;exclude=io.netty:netty-codec-http2;exclude=io.netty:netty-handler;exclude=io.netty:netty-codec;exclude=io.netty:netty-codec-http;exclude=com.google.guava:guava;exclude=org.apache.ivy:ivy;exclude=com.google.protobuf:protobuf-java;exclude=org.apache.commons:commons-compress;exclude=org.apache.commons:commons-lang3;exclude=org.lz4:lz4-java
